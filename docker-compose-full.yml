version: '3.8'

services:
  # ==================== PS WEBSITE ====================
  website:
    build:
      context: .
      dockerfile: Dockerfile.website
    container_name: ps-website
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - NODE_ENV=production
    networks:
      - ps-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ==================== KAVACH v1 ====================
  # (Requires: E:\kavach to be in the parent directory)
  kavach-v1:
    build:
      context: ../kavach
      dockerfile: Dockerfile
    container_name: kavach-v1
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - DATABASE_URL=postgres://kavach:kavach@postgres:5432/kavach_v1
      - DEMO_MODE=false
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - postgres
      - redis
    networks:
      - ps-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    volumes:
      - ./kavach-v1-logs:/app/logs

  # ==================== KAVACH v2 ====================
  # Reverse Proxy Server (Go)
  kavach-v2-server:
    build:
      context: ../kavach-v2/backend
      dockerfile: Dockerfile.server
    container_name: kavach-v2-server
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - REAL_APP_URL=http://netflix-test:8080
      - TOKEN_MANAGER_URL=http://kavach-v2-token-manager:5001
      - WEBSITE_GENERATOR_URL=http://kavach-v2-website-generator:5002
      - DATABASE_URL=sqlite:./kavach.db
      - LOG_LEVEL=info
    depends_on:
      - kavach-v2-token-manager
      - kavach-v2-website-generator
    networks:
      - ps-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    volumes:
      - ./kavach-v2-data:/app/data
      - ./kavach-v2-logs:/app/logs

  # Token Manager Agent (Python/FastAPI)
  kavach-v2-token-manager:
    build:
      context: ../kavach-v2/agents/token_manager
      dockerfile: Dockerfile
    container_name: kavach-v2-token-manager
    ports:
      - "5001:5001"
    environment:
      - PORT=5001
      - DATABASE_URL=sqlite:../kavach.db
      - LOG_LEVEL=info
    networks:
      - ps-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    volumes:
      - ./kavach-v2-data:/app/data

  # Website Generator Agent (Python/FastAPI)
  kavach-v2-website-generator:
    build:
      context: ../kavach-v2/agents/website_generator
      dockerfile: Dockerfile
    container_name: kavach-v2-website-generator
    ports:
      - "5002:5002"
    environment:
      - PORT=5002
      - REAL_APP_URL=http://netflix-test:8080
      - LOG_LEVEL=info
    networks:
      - ps-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5002/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Netflix Test App (Go) - Real app behind reverse proxy
  netflix-test:
    build:
      context: ../kavach-v2/backend
      dockerfile: Dockerfile.netflix
    container_name: netflix-test
    ports:
      - "8081:8080"
    environment:
      - PORT=8080
    networks:
      - ps-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ==================== INFRASTRUCTURE ====================
  # PostgreSQL Database (for Kavach v1)
  postgres:
    image: postgres:15-alpine
    container_name: ps-postgres
    environment:
      - POSTGRES_DB=kavach_v1
      - POSTGRES_USER=kavach
      - POSTGRES_PASSWORD=kavach_dev_password
    ports:
      - "5432:5432"
    networks:
      - ps-network
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kavach"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache (for Kavach v1)
  redis:
    image: redis:7-alpine
    container_name: ps-redis
    ports:
      - "6379:6379"
    networks:
      - ps-network
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: ps-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - website
      - kavach-v1
      - kavach-v2-server
    networks:
      - ps-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  postgres-data:
  redis-data:

networks:
  ps-network:
    driver: bridge
